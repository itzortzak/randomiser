<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Number Randomiser – Classroom use</title>

<!-- Inline favicon (SVG dice on green) -->
<link rel="icon" type="image/svg+xml"
href='data:image/svg+xml;utf8,<?xml version="1.0" encoding="UTF-8"?>

<path d="M170 196 L256 152 L342 196 L256 240 Z" fill="%23ffffff"/>
<circle cx="256" cy="190" r="10" fill="%23232323"/>

<circle cx="236" cy="204" r="10" fill="%23232323"/>
<circle cx="276" cy="204" r="10" fill="%23232323"/>
<ellipse cx="208" cy="290" rx="12" ry="16" fill="%23232323"/>

<style>
  :root { --gap: 12px; --green:#4CAF50; --bg:#f4f6f9; }
  * { box-sizing: border-box; }
  body {
    font-family: "Segoe UI", system-ui, Arial, sans-serif;
    background: var(--bg);
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 20px;
  }
  .card {
    background: #fff;
    width: 380px;
    max-width: 96vw;
    padding: 26px;
    border-radius: 16px;
    box-shadow: 0 10px 30px rgba(0,0,0,.08);
  }
  h1 { margin: 0 0 8px; font-size: 22px; color:#222; }
  .sub { margin: 0 0 16px; color:#666; font-size: 13px; }
  .row { display: flex; align-items: center; gap: var(--gap); flex-wrap: wrap; }
  .row + .row { margin-top: var(--gap); }
  label { font-size: 14px; color:#333; }
  input[type="number"] {
    width: 100px; padding: 8px 10px; border: 1px solid #d0d5dd;
    border-radius: 8px; font-size: 16px; text-align: center;
  }
  .btn {
    appearance: none; border: 0; border-radius: 10px; padding: 10px 16px; font-size: 16px;
    background: var(--green); color: #fff; cursor: pointer; transition: transform .02s ease, opacity .2s;
  }
  .btn:active { transform: translateY(1px); }
  .btn.secondary { background: #6b7280; }
  .btn.warn { background: #ef4444; }
  .controls { display:grid; grid-template-columns: 1fr 1fr; gap: var(--gap); margin-top: var(--gap); }
  #result {
    font-size: 64px; font-weight: 800; text-align: center; color:#111; margin: 14px 0 6px;
  }
  .meta { font-size: 13px; color:#555; display:flex; justify-content: space-between; }
  .history { margin-top: 18px; border-top: 1px solid #eee; padding-top: 12px; }
  .history h3 { margin: 0 0 8px; font-size: 14px; color:#444; }
  ul { list-style: none; padding:0; margin:0; max-height: 180px; overflow:auto; }
  li { background:#f1f5f9; margin-bottom:6px; border-radius:8px; padding:8px 10px; font-size:15px; }
  .note { font-size: 12px; color:#666; margin-top: 12px; text-align:center; }
</style>
</head>
<body>
  <div class="card">
    <h1>🎲 Number Randomiser</h1>
    <p class="sub"> Great for classroom draws, quizzes, oral exams.</p>

    <div class="row" aria-label="Range">
      <label for="min">From</label>
      <input type="number" id="min" value="1" min="-999999" />
      <label for="max">to</label>
      <input type="number" id="max" value="20" min="-999999" />
    </div>

    <div class="row" aria-label="Options">
      <label>
        <input type="checkbox" id="noRepeats" checked />
        No repeats (draw without replacement)
      </label>
    </div>

    <div class="controls">
      <button class="btn" id="drawBtn">Generate</button>
      <button class="btn secondary" id="resetBtn" title="Rebuild the pool from the current range">Reset</button>
      <button class="btn secondary" id="drawAllBtn" title="Draw everything left in one go">Draw all remaining</button>
      <button class="btn warn" id="clearHistoryBtn" title="Clear the list below">Clear history</button>
    </div>

    <div id="result" aria-live="polite">?</div>
    <div class="meta">
      <span id="statusText">Pool: 1–20 (no repeats)</span>
      <span id="remainingText">Remaining: 20</span>
    </div>

    <div class="history">
      <h3>History (latest first)</h3>
      <ul id="historyList"></ul>
    </div>

    <p class="note">Tip: Press <strong>Enter</strong> or <strong>Space</strong> to draw.</p>
  </div>

<script>
  // ----- State -----
  let pool = [];          // available numbers when no-repeats is ON
  let historyArr = [];    // latest first
  const HISTORY_LIMIT = 100;

  // ----- Elements -----
  const elMin = document.getElementById('min');
  const elMax = document.getElementById('max');
  const elNoRepeats = document.getElementById('noRepeats');
  const elResult = document.getElementById('result');
  const elStatus = document.getElementById('statusText');
  const elRemaining = document.getElementById('remainingText');
  const elHistory = document.getElementById('historyList');

  const btnDraw = document.getElementById('drawBtn');
  const btnReset = document.getElementById('resetBtn');
  const btnDrawAll = document.getElementById('drawAllBtn');
  const btnClearHistory = document.getElementById('clearHistoryBtn');

  // ----- Helpers -----
  function parseRange() {
    const min = Number(elMin.value);
    const max = Number(elMax.value);
    if (!Number.isFinite(min) || !Number.isFinite(max) || Math.floor(min) !== min || Math.floor(max) !== max) {
      throw new Error('Please use whole numbers.');
    }
    if (min > max) throw new Error('Min cannot be greater than Max.');
    return { min, max };
  }

  function buildPool(min, max) {
    pool = [];
    for (let n = min; n <= max; n++) pool.push(n);
    updateStatus();
  }

  function updateStatus() {
    const { min, max } = parseRangeSafe();
    elStatus.textContent = `Pool: ${min}–${max}${elNoRepeats.checked ? ' (no repeats)' : ''}`;
    elRemaining.textContent = elNoRepeats.checked ? `Remaining: ${pool.length}` : 'Remaining: ∞';
  }

  function parseRangeSafe() {
    try { return parseRange(); }
    catch { return { min: Number(elMin.value) || 0, max: Number(elMax.value) || 0 }; }
  }

  function pushHistory(value) {
    historyArr.unshift(value);
    if (historyArr.length > HISTORY_LIMIT) historyArr.pop();
    renderHistory();
  }

  function renderHistory() {
    elHistory.innerHTML = '';
    historyArr.forEach((val, i) => {
      const li = document.createElement('li');
      li.textContent = `#${i + 1}: ${val}`;
      elHistory.appendChild(li);
    });
  }

  function showResult(text) { elResult.textContent = text; }

  // ----- Actions -----
  function resetPoolFromInputs() {
    try {
      const { min, max } = parseRange();
      buildPool(min, max);
      // If switching back to a previous range, remove already-drawn items in that range
      if (elNoRepeats.checked) {
        const drawnSet = new Set(historyArr.filter(n => Number.isInteger(n) && n >= min && n <= max));
        pool = pool.filter(n => !drawnSet.has(n));
      }
      showResult('?');
      updateStatus();
    } catch {
      showResult('Invalid range');
    }
  }

  function generateOne() {
    let min, max;
    try { ({ min, max } = parseRange()); }
    catch { showResult('Invalid range'); return; }

    if (elNoRepeats.checked) {
      // Rebuild pool if empty or if user changed the range
      if (pool.length === 0) {
        buildPool(min, max);
        const drawnSet = new Set(historyArr.filter(n => Number.isInteger(n) && n >= min && n <= max));
        pool = pool.filter(n => !drawnSet.has(n));
      }
      if (pool.length === 0) { showResult('Pool empty'); updateStatus(); return; }
      const idx = Math.floor(Math.random() * pool.length);
      const picked = pool.splice(idx, 1)[0];
      showResult(picked);
      pushHistory(picked);
      updateStatus();
    } else {
      const picked = Math.floor(Math.random() * (max - min + 1)) + min;
      showResult(picked);
      pushHistory(picked);
      updateStatus();
    }
  }

  function drawAllRemaining() {
    let min, max;
    try { ({ min, max } = parseRange()); }
    catch { showResult('Invalid range'); return; }

    if (!elNoRepeats.checked) {
      alert('Enable "No repeats" to draw all remaining.');
      return;
    }
    if (pool.length === 0) {
      buildPool(min, max);
      const drawnSet = new Set(historyArr.filter(n => Number.isInteger(n) && n >= min && n <= max));
      pool = pool.filter(n => !drawnSet.has(n));
    }
    if (pool.length === 0) { showResult('Pool empty'); updateStatus(); return; }

    // Shuffle remaining (Fisher–Yates)
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    while (pool.length) pushHistory(pool.shift());
    showResult('✓');
    updateStatus();
  }

  function clearHistory() {
    historyArr = [];
    renderHistory();
    updateStatus();
    showResult('?');
  }

  // ----- Events -----
  btnDraw.addEventListener('click', generateOne);
  btnReset.addEventListener('click', resetPoolFromInputs);
  btnDrawAll.addEventListener('click', drawAllRemaining);
  btnClearHistory.addEventListener('click', clearHistory);

  [elMin, elMax, elNoRepeats].forEach(el => {
    el.addEventListener('change', () => { resetPoolFromInputs(); updateStatus(); });
  });

  // Keyboard shortcuts
  [elMin, elMax].forEach(el => el.addEventListener('keyup', e => { if (e.key === 'Enter') generateOne(); }));
  document.addEventListener('keyup', e => { if (e.key === ' ') generateOne(); });

  // ----- Init -----
  resetPoolFromInputs();
  updateStatus();
</script>
</body>
</html>
